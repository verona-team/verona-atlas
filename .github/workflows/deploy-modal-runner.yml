# Deploy the Modal runner (chat + test execution) when `main` is updated.
#
# Setup (one-time):
# 1. Create a Modal token: https://modal.com/settings/tokens
# 2. In GitHub: repo → Settings → Secrets and variables → Actions → New repository secret
#    - MODAL_TOKEN_ID
#    - MODAL_TOKEN_SECRET
#
# Deploy runs from the repo root: `modal deploy runner/modal_app.py`.
# That single command registers all three @app.function's declared in
# runner/modal_app.py atomically under the `atlas-runner` Modal app:
# execute_test_run, process_chat_turn, process_nightly_job.

name: Deploy Modal runner

on:
  push:
    branches:
      - main
    paths:
      - "runner/**"
      - ".github/workflows/deploy-modal-runner.yml"
  workflow_dispatch:

# Serialize deploys so two PRs merged back-to-back don't race on the
# same Modal app. Each new push to main supersedes an in-flight deploy
# rather than queueing — we only ever want the tip of main deployed.
concurrency:
  group: deploy-modal-runner
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Pin the CLI to the same range runner/modal_app.py specifies for
      # its chat_image. Keeps the version the Actions runner uses to
      # DEPLOY aligned with the version running INSIDE the deployed
      # functions. Previously "modal>=0.64", which worked only because
      # pip's resolver happens to pick the latest compatible version;
      # nothing prevented it from picking a much older release.
      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install "modal>=1.4.0,<2.0.0"

      - name: Modal deploy (atlas-runner)
        run: modal deploy runner/modal_app.py
