# Deploy the Modal test runner when `main` is updated.
#
# Setup (one-time):
# 1. Create a Modal token: https://modal.com/settings/tokens
# 2. In GitHub: repo → Settings → Secrets and variables → Actions → New repository secret
#    - MODAL_TOKEN_ID
#    - MODAL_TOKEN_SECRET
#
# Deploy runs from the repo root: `modal deploy runner/modal_app.py`

name: Deploy Modal runner

on:
  push:
    branches:
      - main
    paths:
      - "runner/**"
      - ".github/workflows/deploy-modal-runner.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Modal CLI
        run: |
          python -m pip install --upgrade pip
          pip install "modal>=0.64"

      - name: Modal deploy (atlas-runner)
        run: modal deploy runner/modal_app.py
